{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-warning text-dark">

<h3>

<i class="fa-solid fa-user-pen"></i>

Edit Patient

</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Patient Name

</label>

<input
type="text"
name="name"
class="form-control"
value="{{ patient.name }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Age

</label>

<input
type="number"
name="age"
class="form-control"
value="{{ patient.age }}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Gender

</label>

<select
name="gender"
class="form-control">

<option value="Male"
{% if patient.gender=="Male" %}selected{% endif %}>
Male
</option>

<option value="Female"
{% if patient.gender=="Female" %}selected{% endif %}>
Female
</option>

<option value="Other"
{% if patient.gender=="Other" %}selected{% endif %}>
Other
</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ patient.phone }}"
required>

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

Address

</label>

<textarea
name="address"
class="form-control"
rows="3">{{ patient.address }}</textarea>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Blood Group

</label>

<select
name="blood_group"
class="form-control">

<option value="">Select Blood Group</option>

<option value="A+"
{% if patient.blood_group=="A+" %}selected{% endif %}>A+</option>

<option value="A-"
{% if patient.blood_group=="A-" %}selected{% endif %}>A-</option>

<option value="B+"
{% if patient.blood_group=="B+" %}selected{% endif %}>B+</option>

<option value="B-"
{% if patient.blood_group=="B-" %}selected{% endif %}>B-</option>

<option value="AB+"
{% if patient.blood_group=="AB+" %}selected{% endif %}>AB+</option>

<option value="AB-"
{% if patient.blood_group=="AB-" %}selected{% endif %}>AB-</option>

<option value="O+"
{% if patient.blood_group=="O+" %}selected{% endif %}>O+</option>

<option value="O-"
{% if patient.blood_group=="O-" %}selected{% endif %}>O-</option>

</select>

</div>

</div>

<div class="mt-3">

<button
type="submit"
class="btn btn-success">

<i class="fa-solid fa-floppy-disk"></i>

Update Patient

</button>

<a
href="{{ url_for('patients') }}"
class="btn btn-secondary">

<i class="fa-solid fa-arrow-left"></i>

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
