
{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-danger text-white">

<h2>

<i class="fa-solid fa-key"></i>

Change Password

</h2>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Old Password</label>

<input
type="password"
name="old_password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>New Password</label>

<input
type="password"
name="new_password"
class="form-control"
required
minlength="6"
autocomplete="new-password">

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
name="confirm_password"
class="form-control"
required
minlength="6"
autocomplete="new-password">

</div>

<button class="btn btn-success">

<i class="fa-solid fa-key"></i>

Change Password

</button>

<a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

{% endblock %}
